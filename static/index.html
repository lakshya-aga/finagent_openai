<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinAgent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f0f0f;
    color: #e8e8e8;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid #222;
    background: #141414;
    flex-shrink: 0;
  }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.02em; color: #fff; }
  .header-right { display: flex; align-items: center; gap: 10px; }

  .badge {
    display: none;
    align-items: center;
    gap: 6px;
    background: #1a2e1a;
    border: 1px solid #2a4a2a;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    color: #6fcf6f;
  }
  .badge.visible { display: flex; }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #4caf50; }

  .btn {
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid #333;
    background: #1e1e1e;
    color: #ccc;
    transition: background 0.15s;
  }
  .btn:hover { background: #2a2a2a; }
  .btn-primary { background: #1a3a5c; border-color: #2a5a8c; color: #7fc8f8; }
  .btn-primary:hover { background: #1e4570; }

  /* ── Chat area ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    scroll-behavior: smooth;
  }

  .message-row {
    display: flex;
    padding: 4px 20px;
    max-width: 820px;
    margin: 0 auto;
    width: 100%;
  }
  .message-row.user { justify-content: flex-end; }
  .message-row.assistant { justify-content: flex-start; }

  .bubble {
    max-width: 72%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .user .bubble {
    background: #1a3a5c;
    color: #d0eaff;
    border-bottom-right-radius: 3px;
  }
  .assistant .bubble {
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    color: #e0e0e0;
    border-bottom-left-radius: 3px;
  }
  .assistant .bubble.status {
    background: transparent;
    border: none;
    color: #666;
    font-size: 13px;
    font-style: italic;
    padding: 4px 0;
  }
  .assistant .bubble.error {
    background: #2a1a1a;
    border-color: #4a2a2a;
    color: #ff8a8a;
  }

  /* ── Typing dots ── */
  .typing { display: flex; align-items: center; gap: 4px; padding: 8px 0; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: #555; animation: blink 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

  /* ── Notebook result card ── */
  .notebook-card {
    margin-top: 10px;
    background: #181f18;
    border: 1px solid #2a3a2a;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
  }
  .notebook-card .nb-label { color: #6fcf6f; font-weight: 600; margin-bottom: 6px; }
  .notebook-card .nb-name { color: #aaa; font-family: monospace; font-size: 12px; }
  .notebook-card a {
    display: inline-block;
    margin-top: 8px;
    color: #7fc8f8;
    text-decoration: none;
    font-size: 12px;
  }
  .notebook-card a:hover { text-decoration: underline; }

  /* ── Input area ── */
  footer {
    padding: 16px 20px;
    border-top: 1px solid #222;
    background: #141414;
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 10px;
    max-width: 820px;
    margin: 0 auto;
  }
  textarea {
    flex: 1;
    background: #1e1e1e;
    border: 1px solid #333;
    border-radius: 8px;
    color: #e8e8e8;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.5;
    padding: 10px 14px;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 160px;
    overflow-y: auto;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: #4a8abf; }
  textarea::placeholder { color: #555; }
  #send-btn {
    align-self: flex-end;
    padding: 10px 18px;
    background: #1a3a5c;
    border: 1px solid #2a5a8c;
    border-radius: 8px;
    color: #7fc8f8;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  #send-btn:hover:not(:disabled) { background: #1e4570; }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <h1>⚗️ FinAgent</h1>
  <div class="header-right">
    <div class="badge" id="nb-badge">
      <div class="badge-dot"></div>
      <span id="nb-badge-text">notebook ready</span>
    </div>
    <button class="btn btn-primary" id="download-btn" style="display:none" onclick="downloadNotebook()">
      ↓ Download notebook
    </button>
    <button class="btn" onclick="newSession()">New chat</button>
  </div>
</header>

<div id="chat"></div>

<footer>
  <div class="input-row">
    <textarea id="input" placeholder="Describe a research idea or ask to refine the existing notebook…" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="send()">Send</button>
  </div>
</footer>

<script>
  let sessionId = localStorage.getItem("finagent_session");
  let busy = false;

  async function initSession() {
    if (!sessionId) {
      const res = await fetch("/api/session", { method: "POST" });
      const data = await res.json();
      sessionId = data.session_id;
      localStorage.setItem("finagent_session", sessionId);
    }
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 160) + "px";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  }

  function appendMessage(role, content, cls = "") {
    const chat = document.getElementById("chat");
    const row = document.createElement("div");
    row.className = `message-row ${role}`;
    const bubble = document.createElement("div");
    bubble.className = `bubble ${cls}`;
    if (typeof content === "string") {
      bubble.textContent = content;
    } else {
      bubble.appendChild(content);
    }
    row.appendChild(bubble);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
    return bubble;
  }

  function showTyping() {
    const chat = document.getElementById("chat");
    const row = document.createElement("div");
    row.className = "message-row assistant";
    row.id = "typing-row";
    row.innerHTML = `<div class="bubble status"><div class="typing"><span></span><span></span><span></span></div></div>`;
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    document.getElementById("typing-row")?.remove();
  }

  let _statusBubble = null;
  function updateStatus(msg) {
    if (!_statusBubble) {
      removeTyping();
      _statusBubble = appendMessage("assistant", msg, "status");
    } else {
      _statusBubble.textContent = msg;
    }
    document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
  }

  function showNotebookResult(notebookPath, mode) {
    const name = notebookPath.split("/").pop();
    const el = document.createElement("div");
    el.innerHTML = `
      <div class="nb-label">${mode === "edit" ? "✏️ Notebook updated" : "✅ Notebook generated"}</div>
      <div class="nb-name">${name}</div>
      <a href="/api/notebook/${sessionId}" download="${name}">Download ${name}</a>
    `;
    el.className = "notebook-card";
    appendMessage("assistant", el);

    // Update header badge
    document.getElementById("nb-badge-text").textContent = name;
    document.getElementById("nb-badge").classList.add("visible");
    document.getElementById("download-btn").style.display = "inline-block";
  }

  async function send() {
    if (busy) return;
    const input = document.getElementById("input");
    const msg = input.value.trim();
    if (!msg) return;

    input.value = "";
    input.style.height = "auto";
    document.getElementById("send-btn").disabled = true;
    busy = true;
    _statusBubble = null;

    appendMessage("user", msg);
    showTyping();

    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: sessionId, message: msg }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        let event;
        try { event = JSON.parse(line.slice(6)); } catch { continue; }

        if (event.type === "status") {
          updateStatus("⏳ " + event.message);
        } else if (event.type === "done") {
          removeTyping();
          _statusBubble?.remove();
          _statusBubble = null;
          if (event.mode === "question") {
            appendMessage("assistant", event.summary || "Done.");
          } else if (event.notebook_path) {
            showNotebookResult(event.notebook_path, event.mode);
          }
        } else if (event.type === "error") {
          removeTyping();
          _statusBubble?.remove();
          _statusBubble = null;
          appendMessage("assistant", "Error: " + event.message, "error");
        }
      }
    }

    busy = false;
    document.getElementById("send-btn").disabled = false;
    document.getElementById("input").focus();
  }

  function downloadNotebook() {
    window.location.href = `/api/notebook/${sessionId}`;
  }

  async function newSession() {
    await fetch(`/api/session/${sessionId}`, { method: "DELETE" });
    localStorage.removeItem("finagent_session");
    sessionId = null;
    document.getElementById("chat").innerHTML = "";
    document.getElementById("nb-badge").classList.remove("visible");
    document.getElementById("download-btn").style.display = "none";
    await initSession();
  }

  initSession();
</script>
</body>
</html>
